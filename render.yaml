services:
  - type: web
    name: mi-servidor
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: redsp@fulars.com
      - key: BASE_URL
        value: https://redsocialypolitica.fulars.com
      - key: FRONTEND_URL
        value: https://redsocialypolitica.fulars.com
      - key: LOG_LEVEL
        value: info
      - key: ENCRYPTION_KEY
        sync: false
