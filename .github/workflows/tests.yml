name: tests

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run regression tests
        run: npm test -- tests/unit/leader-form.save.test.js tests/unit/leader-name.test.js tests/unit/ui-manager.test.js tests/unit/registration-service.findLeader.test.js tests/unit/chart-service.test.js tests/integration/leader-registration.integration.test.js --no-coverage
